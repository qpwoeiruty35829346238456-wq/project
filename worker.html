<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body class="bady">
     <!-- <select id="lang" class="lang">
        <option value="en">English</option>
        <option value="ar">العربية</option>
     </select> -->
    <h1 class="hello" data-i18n="hello">Hello</h1>
    <h3 class="ras" data-i18n="storeLocation">Enter Your Store Location Details</h3>
    <form onsubmit="return good()">
        <label for="e" class="tipe" data-i18n="storeType">Enter Store type</label>
        <input id="e" class="type" type="text" name="store_type" style="font-size: 20px" autocapitalize="words" autocorrect="off" autocomplete="text" required>
     <label for="a" class="shop" data-i18n="shopName">enter your shop name</label>
        <input id="a" style="font-size: 20px;" class="name" type="text" name="shop_name" autocapitalize="words" autocorrect="off" autocomplete="text" required>
     <label for="b" class="phone" data-i18n="phoneNumber">enter your phone number</label>
        <input id="b" inputmode="numeric" pattern="^01[0-2,5][0-9]{8}$" oninput='this.value = this.value.replace(/[^0-9]/g, "")' style="font-size: 20px;" class="tel" type="tel" name="mobile_phone" autocomplete="tel" required>
        <label for="c" class="whats" data-i18n="whatsApp">WhatsApp Number</label>
        <input id="c" inputmode="numeric" pattern="^01[0-2,5][0-9]{8}$" oninput='this.value = this.value.replace(/[^0-9]/g, "")' style="font-size: 20px;" class="whats_app" type="tel" name="whatsapp_number" autocomplete="tel" required>
        <label for="d" class="num" data-i18n="ExpectedSalary">Expected Salary</label>
        <input id="d" style="font-size: 20px;" class="telo" type="number" name="expected_salary" autocomplete="number" required>
        <select id="governorate" class="option" name="governorate" required>
            <option value="" disabled selected hidden>Select governorate</option>
            <option value="alex">Alexandria</option>
            <option value="aswan">Aswan</option>
            <option value="asyut">Asyut</option>
            <option value="beheira">Beheira</option>
            <option value="beni_suef">Beni suef</option>
            <option value="cairo">Cairo</option>
            <option value="dakahlia">Dakahlia</option>
            <option value="damietta">Damietta</option>
            <option value="fayoum">Fayoum</option>
            <option value="gharbia">Gharbia</option>
            <option value="giza">Giza</option>
            <option value="ismailia">Ismailia</option>
            <option value="kafr_el_sheikh">Kafr El Sheikh</option>
            <option value="luxor">Luxor</option>
            <option value="matrouh">Matrouh</option>
            <option value="minya">Minya</option>
            <option value="monufia">Monufia</option>
            <option value="new_valley">New Valley</option>
            <option value="north_sinai">North Sinai</option>
            <option value="port_said">Port Said</option>
            <option value="qalyubia">Qalyubia</option>
            <option value="qena">Qena</option>
            <option value="red_sea">Red Sea</option>
            <option value="sharqia">Sharqia</option>
            <option value="sohag">Sohag</option>
            <option value="south_sinai">South Sinai</option>
            <option value="suez">Suez</option> 
        </select>
        <select name="city" id="city" class="city" required>
            <option value=""disabled selected hidden>Select city</option>
        </select>
        <button class="Next" style="font-size: 30px;">Next</button>
    </form>
    <button type="button" onclick="window.location.href = 'complete.html'">Manage Offers</button>
    <script src="translations.js"></script>
    <script src="lang.js"></script>
    <script src="chose.js"></script>
</body>
</html>
